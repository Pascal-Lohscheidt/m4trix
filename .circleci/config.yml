workflows:
  version: 2
  test-and-build:
    jobs:
      - test
      - build:
          requires:
            - test
      - publish-core:
          context:
            - NPM
          requires:
            - build
          filters:
            branches:
              only: main
      - publish-evals:
          context:
            - NPM
          requires:
            - build
          filters:
            branches:
              only: main
      - publish-stream:
          context:
            - NPM
          requires:
            - build
          filters:
            branches:
              only: main
      - publish-react:
          context:
            - NPM
          requires:
            - build
          filters:
            branches:
              only: main
      - publish-ui:
          context:
            - NPM
          requires:
            - build
          filters:
            branches:
              only: main
