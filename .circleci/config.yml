          name: Bump version and create tag
          command: pnpm exec jiti scripts/bump-and-tag.ts evals
      - run:
          name: Build evals package
          command: pnpm run evals:build
      - run:
          name: Authenticate with npm
          command: echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
      - run:
          name: Publish evals package
          command: pnpm run evals:publish

  publish-stream:
    docker:
      - image: cimg/node:20.0
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: pnpm install
      - run:
          name: Check if stream package should be published
          command: pnpm exec jiti scripts/check-package-scope.ts stream || circleci step halt
      - run:
          name: Bump version and create tag
          command: pnpm exec jiti scripts/bump-and-tag.ts stream
      - run:
          name: Build stream package
          command: pnpm run stream:build
      - run:
          name: Authenticate with npm
          command: echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
      - run:
          name: Publish stream package
          command: pnpm run stream:publish

  publish-react:
    docker:
      - image: cimg/node:20.0
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: pnpm install
      - run:
          name: Check if react package should be published
          command: pnpm exec jiti scripts/check-package-scope.ts react || circleci step halt
      - run:
          name: Bump version and create tag
